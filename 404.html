<!DOCTYPE html>
<html lang="ru" data-theme="messenger">
<head>
  <meta charset="UTF-8">
  <script>
    // Redirect to index.html with hash for SPA routing
    var path = window.location.pathname.replace(/^\/[^/]+/, '');
    window.location.replace(window.location.origin + window.location.pathname.split('/').slice(0, -1).join('/') + '/#' + path);
  </script>
</head>
<body>
  <p>Перенаправление в Вавилон...</p>
</body>
</html>
