<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Русская Библиотека Вавилона</title>
  <meta name="description" content="Русская Библиотека Вавилона: обратимое кодирование страницы в адрес без хранения страниц и индекса." />
  <meta property="og:title" content="Русская Библиотека Вавилона" />
  <meta property="og:description" content="Адрес — это число страницы. Страница восстанавливается из адреса." />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="shell">
    <header class="hero">
      <a class="brand" href="./#/">
        <span class="brand-mark">БВ</span>
        <span>
          <strong>Русская Библиотека Вавилона</strong>
          <small>реальный алгоритм: страница ⇄ число ⇄ адрес</small>
        </span>
      </a>
      <nav class="top-actions">
        <button id="randomBtn" type="button">Случайная страница</button>
        <button id="favoritesBtn" type="button">Избранное</button>
        <button id="copyLinkBtn" type="button">Скопировать ссылку</button>
      </nav>
    </header>

    <main id="app"></main>

    <footer class="footer">
      <span>Страницы не хранятся.</span>
      <span><code>адрес → BigInt → текст</code></span>
      <span><code>текст → BigInt → адрес</code></span>
      <span>Версии алгоритма зафиксированы в <code>app.js</code>.</span>
    </footer>
  </div>

  <script src="./app.js"></script>
</body>
</html>
