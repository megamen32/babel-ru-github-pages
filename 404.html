<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Русская Библиотека Вавилона</title>
  <meta name="description" content="Русская Библиотека Вавилона без хранения страниц: обратимое кодирование страницы в адрес." />
  <meta property="og:title" content="Русская Библиотека Вавилона" />
  <meta property="og:description" content="Страница не хранится: адрес является числом, которое обратимо разворачивается в текст." />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="shell">
    <header class="hero">
      <a class="brand" href="./#/">
        <span class="brand-mark">БВ</span>
        <span>
          <strong>Русская Библиотека Вавилона</strong>
          <small>реальный обратимый алгоритм: адрес ⇄ страница</small>
        </span>
      </a>
      <nav class="top-actions">
        <button id="randomBtn" type="button">Случайная страница</button>
        <button id="copyLinkBtn" type="button">Скопировать ссылку</button>
      </nav>
    </header>

    <main id="app"></main>

    <footer class="footer">
      <span>Страницы не хранятся.</span>
      <span><code>адрес → число → страница</code></span>
      <span><code>страница → число → адрес</code></span>
      <span>Алгоритм версии <code>v1</code> нельзя менять без создания <code>v2</code>.</span>
    </footer>
  </div>

  <script src="./app.js"></script>
</body>
</html>
