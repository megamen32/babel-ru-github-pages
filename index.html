<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Русская Библиотека Вавилона</title>
  <meta name="description" content="Русская Библиотека Вавилона: честная координатная система, обратимое кодирование страниц, GitHub Pages." />
  <meta property="og:title" content="Русская Библиотека Вавилона" />
  <meta property="og:description" content="Адрес — это настоящие координаты страницы. Страница восстанавливается из числа." />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="shell">
    <header class="hero">
      <a class="brand" href="./#/">
        <span class="brand-mark">БВ</span>
        <span>
          <strong>Русская Библиотека Вавилона</strong>
          <small>страница ⇄ число ⇄ настоящие координаты</small>
        </span>
      </a>
      <nav class="top-actions">
        <button id="randomBtn" type="button">Случайная страница</button>
        <button id="favoritesBtn" type="button">Избранное</button>
        <button id="copyLinkBtn" type="button">Скопировать ссылку</button>
      </nav>
    </header>

    <main id="app"></main>

    <footer class="footer">
      <span>Страницы не хранятся.</span>
      <span><code>координаты → BigInt → текст</code></span>
      <span><code>текст → BigInt → координаты</code></span>
      <span><code>v1</code>, <code>v1s</code>, <code>v1c</code> заморожены как версии алгоритма.</span>
    </footer>
  </div>

  <script src="./app.js"></script>
</body>
</html>
